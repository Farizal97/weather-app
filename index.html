<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mantap WeatherApp powered by Open‑Meteo</title>
  <meta name="description" content="Aplikasi web cuaca sederhana tanpa API key." />
  
  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    /* Tambahan agar saat kosong tidak terlihat berantakan */
    #currentIcon:empty, #temp:empty, #place:empty { min-height: 20px; }
    .pill:empty { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div data-include="components/header.html"></div>
    <div class="status" id="status"></div>
    <!-- Navbar -->
    <div data-include="components/navbar.html"></div>

    <section class="grid">
      <div class="card" id="panel-left">
        <h2>Ringkasan Saat Ini</h2>
        <div class="current" id="current">
          <!-- Tanda minus dihapus agar bersih saat awal -->
          <div class="icon" id="currentIcon" aria-hidden="true"></div>
          <div>
            <div id="place" style="font-weight:700; font-size:18px">Cari kota untuk mulai...</div>
            <div class="row" style="margin-top:6px">
              <div class="big-temp" id="temp"></div>
              <span class="pill" id="desc"></span>
            </div>
            <div class="muted" id="time"></div>
          </div>
        </div>
        <div class="meta" style="margin-top:12px">
          <div>Angin: <strong id="wind"></strong></div>
          <div>Kode Cuaca: <strong id="code"></strong></div>
          <div>Kelembapan: <strong id="humidity"></strong></div>
          <div>Curah Hujan: <strong id="precip"></strong></div>
        </div>
      </div>

      <div class="card">
        <h2>Perkiraan 7 Hari</h2>
        <div class="forecast" id="forecast">
          <!-- Pesan tunggu sebelum ada data -->
          <p class="muted" style="text-align:center; padding:20px;">Data perkiraan akan muncul di sini.</p>
        </div>
      </div>
    </section>

    <section class="card" style="margin-top:16px">
      <h2>Pencarian Terakhir</h2>
      <div class="recent" id="recent"></div>
    </section>

    <!-- Footer -->
    <div data-include="components/footer.html"></div>
  </div>

  <!-- JS -->
  <script src="assets/js/include.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
